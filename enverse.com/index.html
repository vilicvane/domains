<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>Enverse · 熵减宇宙</title>
    <style>
      :root {
        --bg-void: #02030a;
        --bg-deep: #060816;
        --bg-bloom: #140914;
        --ink-gold: rgba(248, 232, 196, 0.96);
        --ink-ice: rgba(188, 212, 255, 0.9);
        --ink-soft: rgba(242, 246, 255, 0.72);
        --ink-fallback: rgba(244, 239, 228, 0.92);
        --scheme-gold-a: rgba(255, 248, 234, 0.98);
        --scheme-gold-b: rgba(245, 223, 184, 0.95);
        --scheme-gold-c: rgba(219, 187, 138, 0.9);
        --scheme-ice-a: rgba(236, 245, 255, 0.96);
        --scheme-ice-b: rgba(193, 215, 246, 0.92);
        --scheme-ice-c: rgba(145, 178, 228, 0.88);
        --scheme-lilac-a: rgba(239, 234, 255, 0.94);
        --scheme-lilac-b: rgba(208, 197, 245, 0.88);
        --scheme-lilac-c: rgba(170, 159, 220, 0.82);
        --scheme-glow-gold: rgba(255, 213, 151, 0.11);
        --scheme-glow-ice: rgba(156, 198, 255, 0.12);
        --scheme-glow-lilac: rgba(197, 183, 255, 0.1);
      }

      @keyframes attributionSheen {
        0% {
          background-position:
            0% 50%,
            center;
        }

        100% {
          background-position:
            100% 50%,
            center;
        }
      }

      @keyframes attributionGlowPulse {
        0%,
        100% {
          opacity: 0.72;
          transform: translateX(-50%) scale(0.98);
        }

        50% {
          opacity: 1;
          transform: translateX(-50%) scale(1.02);
        }
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-height: 100%;
        margin: 0;
      }

      body {
        overflow: hidden;
        overscroll-behavior: none;
        font-family: 'Avenir Next', 'Trebuchet MS', sans-serif;
        background:
          radial-gradient(
            circle at 18% 18%,
            rgba(84, 145, 255, 0.18),
            transparent 28%
          ),
          radial-gradient(
            circle at 82% 20%,
            rgba(255, 137, 182, 0.14),
            transparent 24%
          ),
          radial-gradient(
            circle at 54% 72%,
            rgba(255, 196, 124, 0.1),
            transparent 32%
          ),
          linear-gradient(
            145deg,
            var(--bg-void) 0%,
            var(--bg-deep) 44%,
            var(--bg-bloom) 100%
          );
      }

      body::before,
      body::after {
        content: '';
        position: fixed;
        border-radius: 999px;
        filter: blur(72px);
        opacity: 0.42;
        pointer-events: none;
        z-index: 0;
      }

      body::before {
        top: 10%;
        left: 6%;
        width: min(24rem, 42vw);
        height: min(24rem, 42vw);
        background: radial-gradient(
          circle,
          rgba(71, 138, 255, 0.26),
          transparent 72%
        );
      }

      body::after {
        right: 8%;
        bottom: 8%;
        width: min(22rem, 38vw);
        height: min(22rem, 38vw);
        background: radial-gradient(
          circle,
          rgba(255, 150, 173, 0.18),
          transparent 72%
        );
      }

      .scene {
        position: relative;
        min-height: 100vh;
        min-height: 100svh;
        isolation: isolate;
      }

      #galaxy {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
      }

      .attribution {
        position: fixed;
        left: 50%;
        bottom: clamp(1.4rem, 7vh, 4.5rem);
        z-index: 1;
        width: min(28rem, calc(100vw - 2.5rem));
        display: grid;
        justify-items: center;
        gap: 0;
        padding: 0.2rem 1rem 0;
        text-align: center;
        pointer-events: none;
        isolation: isolate;
        opacity: 0;
        filter: blur(14px);
        transform: translate(-50%, 1.8rem) scale(0.97);
        transition:
          opacity 1800ms cubic-bezier(0.23, 0.72, 0.2, 1),
          transform 2200ms cubic-bezier(0.2, 0.7, 0.2, 1),
          filter 1900ms cubic-bezier(0.22, 0.72, 0.2, 1);
      }

      .attribution::before {
        content: '';
        display: block;
        width: min(7rem, 42%);
        height: 1px;
        margin: 0 auto 0.9rem;
        background: linear-gradient(
          90deg,
          rgba(255, 255, 255, 0),
          rgba(245, 220, 181, 0.68),
          rgba(205, 221, 248, 0.74) 46%,
          rgba(205, 194, 244, 0.7) 72%,
          rgba(255, 255, 255, 0)
        );
        opacity: 0.9;
      }

      .attribution::after {
        content: '';
        position: absolute;
        left: 50%;
        bottom: -1rem;
        z-index: -1;
        width: min(20rem, 72vw);
        height: 5.5rem;
        transform: translateX(-50%);
        background:
          radial-gradient(
            circle at 28% 42%,
            var(--scheme-glow-gold),
            rgba(0, 0, 0, 0) 52%
          ),
          radial-gradient(
            circle at 52% 36%,
            var(--scheme-glow-ice),
            rgba(0, 0, 0, 0) 58%
          ),
          radial-gradient(
            circle at 72% 50%,
            var(--scheme-glow-lilac),
            rgba(0, 0, 0, 0) 56%
          );
        filter: blur(18px);
        animation: attributionGlowPulse 18s ease-in-out infinite;
      }

      .attribution-line {
        display: block;
        opacity: 0;
        transform: translateY(0.7rem);
        transition:
          opacity 1500ms cubic-bezier(0.24, 0.7, 0.2, 1),
          transform 1800ms cubic-bezier(0.22, 0.68, 0.2, 1);
      }

      .attribution-title {
        font-family:
          'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', 'Helvetica Neue',
          sans-serif;
        color: var(--ink-fallback);
        font-size: clamp(1.08rem, 2vw, 1.4rem);
        font-weight: 400;
        letter-spacing: 0.12em;
        line-height: 1.14;
        background-image:
          repeating-linear-gradient(
            112deg,
            rgba(255, 255, 255, 0.22) 0 2px,
            rgba(255, 255, 255, 0) 2px 8px
          ),
          linear-gradient(
            96deg,
            var(--scheme-gold-a) 0%,
            var(--scheme-gold-b) 44%,
            var(--scheme-gold-c) 100%
          );
        background-size:
          260% 100%,
          100% 100%;
        background-position:
          0% 50%,
          center;
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        filter: drop-shadow(0 0 1rem rgba(255, 220, 163, 0.12));
        animation: attributionSheen 28s ease-in-out infinite alternate;
      }

      .attribution-subtitle {
        margin-top: 0.38rem;
        color: var(--ink-ice);
        font-size: clamp(0.68rem, 1.25vw, 0.84rem);
        font-weight: 500;
        letter-spacing: 0.18em;
        text-transform: none;
        background-image: linear-gradient(
          90deg,
          var(--scheme-ice-a) 0%,
          var(--scheme-ice-b) 46%,
          var(--scheme-ice-c) 100%
        );
        background-size: 200% 100%;
        background-position: 0% 50%;
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: attributionSheen 34s ease-in-out infinite alternate-reverse;
      }

      @supports not (
        (-webkit-background-clip: text) or (background-clip: text)
      ) {
        .attribution-title {
          color: var(--ink-gold);
        }

        .attribution-subtitle {
          color: var(--ink-ice);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .attribution::after,
        .attribution-title,
        .attribution-subtitle {
          animation: none;
        }
      }

      body.is-gathered .attribution {
        opacity: 1;
        filter: blur(0);
        transform: translate(-50%, 0) scale(1);
      }

      body.is-gathered .attribution-title {
        opacity: 1;
        transform: translateY(0);
        transition-delay: 520ms;
      }

      body.is-gathered .attribution-subtitle {
        opacity: 1;
        transform: translateY(0);
        transition-delay: 980ms;
      }

      @media (max-width: 720px) {
        .attribution {
          width: min(22rem, calc(100vw - 1.5rem));
          padding: 0.15rem 0.6rem 0;
          bottom: 1.15rem;
        }

        .attribution-title {
          letter-spacing: 0.08em;
        }

        .attribution-subtitle {
          letter-spacing: 0.12em;
        }
      }
    </style>
  </head>
  <body>
    <main class="scene">
      <canvas id="galaxy" aria-hidden="true"></canvas>
      <aside class="attribution" aria-label="Enverse attribution">
        <span class="attribution-line attribution-title">熵减宇宙</span>
        <span class="attribution-line attribution-subtitle"
          >Entropy-reversed Universe</span
        >
      </aside>
    </main>

    <script>
      (() => {
        const canvas = document.getElementById('galaxy');
        const ctx = canvas.getContext('2d');

        if (!ctx) {
          return;
        }

        const TAU = Math.PI * 2;
        const motionQuery = window.matchMedia(
          '(prefers-reduced-motion: reduce)',
        );
        const pointer = {
          x: 0,
          y: 0,
          targetX: 0,
          targetY: 0,
        };

        let width = 0;
        let height = 0;
        let dpr = 1;
        let centerX = 0;
        let centerY = 0;
        let galaxyRadius = 0;
        let haloRadius = 0;
        let coreRadius = 0;
        let armCount = 4;
        let particles = [];
        let dustParticles = [];
        let backgroundStars = [];
        let animationId = 0;
        let sceneStart = performance.now();
        let lastFrame = performance.now();

        const random = (min, max) => min + Math.random() * (max - min);
        const clamp = (value, min, max) => Math.min(max, Math.max(min, value));
        const interpolate = (start, end, amount) =>
          start + (end - start) * amount;

        function easeInOutCubic(value) {
          if (value < 0.5) {
            return 4 * value * value * value;
          }

          return 1 - Math.pow(-2 * value + 2, 3) / 2;
        }

        function shuffle(items) {
          for (let index = items.length - 1; index > 0; index -= 1) {
            const swapIndex = Math.floor(Math.random() * (index + 1));
            [items[index], items[swapIndex]] = [items[swapIndex], items[index]];
          }

          return items;
        }

        function gaussianSpread() {
          const u = Math.max(Math.random(), 1e-6);
          const v = Math.max(Math.random(), 1e-6);
          return Math.sqrt(-2 * Math.log(u)) * Math.cos(TAU * v);
        }

        function resetPointer() {
          pointer.targetX = 0;
          pointer.targetY = 0;
        }

        function setPointer(clientX, clientY) {
          pointer.targetX = (clientX / width - 0.5) * 2;
          pointer.targetY = (clientY / height - 0.5) * 2;
        }

        function buildBackgroundStars(count) {
          backgroundStars = Array.from({length: count}, () => {
            const x = Math.random() * width;
            const y = Math.random() * height;
            const offsetX = x - centerX;
            const offsetY = y - centerY;

            return {
              baseRadius: Math.hypot(offsetX, offsetY),
              baseAngle: Math.atan2(offsetY, offsetX),
              orbitSpeed: random(-0.0075, 0.0075),
              orbitSquash: random(0.94, 1.06),
              size: random(0.45, 1.85),
              alpha: random(0.16, 0.72),
              hue: Math.random() < 0.18 ? random(28, 48) : random(198, 228),
              twinkleSpeed: random(0.35, 1.1),
              twinkleOffset: random(0, TAU),
              driftRadius: random(1.4, 5.6),
              driftSpeed: random(0.075, 0.18),
              driftPhase: random(0, TAU),
              driftTilt: random(0.5, 1.05),
            };
          });
        }

        function buildTextTargets(count) {
          const offscreen = document.createElement('canvas');
          offscreen.width = width;
          offscreen.height = height;

          const offscreenContext = offscreen.getContext('2d');

          if (!offscreenContext) {
            return Array.from({length: count}, () => ({
              x: centerX,
              y: centerY,
            }));
          }

          const fontFamily =
            "'Avenir Next', 'Helvetica Neue', 'Trebuchet MS', sans-serif";
          let fontSize = Math.min(width * 0.22, height * 0.32, 240);
          const maxWidth = width * 0.78;

          offscreenContext.textAlign = 'center';
          offscreenContext.textBaseline = 'middle';

          do {
            offscreenContext.font = `600 ${fontSize}px ${fontFamily}`;
            fontSize *= 0.96;
          } while (
            offscreenContext.measureText('Enverse').width > maxWidth &&
            fontSize > 56
          );

          offscreenContext.clearRect(0, 0, width, height);
          offscreenContext.fillStyle = '#ffffff';
          offscreenContext.fillText('Enverse', width / 2, height / 2);

          const step = Math.max(2, Math.floor(fontSize / 48));
          const imageData = offscreenContext.getImageData(0, 0, width, height);
          const candidates = [];

          for (let y = step; y < height - step; y += step) {
            for (let x = step; x < width - step; x += step) {
              const alphaIndex = (y * width + x) * 4 + 3;

              if (imageData.data[alphaIndex] > 32) {
                candidates.push({x, y});
              }
            }
          }

          if (!candidates.length) {
            return Array.from({length: count}, () => ({
              x: centerX,
              y: centerY,
            }));
          }

          shuffle(candidates);

          return Array.from(
            {length: count},
            (_, index) => candidates[index % candidates.length],
          );
        }

        function buildGalaxyParticles(count, textTargets) {
          particles = Array.from({length: count}, (_, index) => {
            const radiusMix = Math.pow(Math.random(), 1.1);
            const radius = radiusMix * galaxyRadius;
            const textTarget = textTargets[index] ?? {x: centerX, y: centerY};
            const armSlot = Math.floor(Math.random() * armCount);
            const hue =
              radiusMix < 0.17
                ? random(32, 52)
                : Math.random() < 0.15
                  ? random(338, 360)
                  : random(195, 228);

            return {
              armIndex: armSlot,
              radius,
              armJitter: random(-0.62, 0.62),
              spiralTightness: random(0.0075, 0.022),
              angleDrift: random(0.035, 0.19),
              angleDriftOffset: random(0, TAU),
              spread: gaussianSpread() * (10 + radius * 0.068),
              speed: random(0.28, 0.88) / (0.9 + radiusMix * 4.8),
              squash: random(0.72, 0.98),
              size: random(0.5, 2.3) * (1.12 - radiusMix * 0.3),
              alpha: random(0.38, 0.98),
              hue,
              lightness: radiusMix < 0.17 ? random(72, 86) : random(62, 78),
              twinkleSpeed: random(0.8, 3.6),
              twinkleOffset: random(0, TAU),
              driftSpeed: random(0.24, 1.18),
              driftOffset: random(0, TAU),
              parallax: random(0.01, 0.04),
              targetX: textTarget.x,
              targetY: textTarget.y,
              targetDrift: random(0.04, 0.3),
              captureRadius: random(5, 16) * (1 - radiusMix * 0.18),
              captureAngle: random(0, TAU),
              restOffsetX: gaussianSpread() * 0.85,
              restOffsetY: gaussianSpread() * 0.65,
              restFloatRadius: random(0.3, 1.25),
              restFloatSpeed: random(0.16, 0.42),
              restFloatOffset: random(0, TAU),
              restWaveAmplitude: random(0.6, 1.9),
              restWaveSpeed: random(0.35, 0.78),
              restWaveOffset: random(0, TAU),
              arrivalSpin: (Math.random() > 0.5 ? 1 : -1) * random(0.72, 1.34),
              arrivalCurve: random(0.12, 0.34),
              gatherDelay:
                Math.pow(Math.random(), 1.1) * 0.18 + radiusMix * 0.02,
              gatherSpan: random(0.78, 1.08),
              gatherEasePower: random(0.92, 1.22),
              captureRadiusStart: random(0.015, 0.12),
              captureRadiusSpan: random(0.5, 0.82),
              captureCenterStart: random(0.09, 0.34),
              captureCenterSpan: random(0.22, 0.42),
              captureSettleStart: random(0.82, 0.94),
              captureSettleSpan: random(0.035, 0.09),
              trailAlpha: Math.random() < 0.1 ? random(0.03, 0.08) : 0,
              finalScale: random(0.82, 1.04),
              glowScale: random(1.12, 1.46),
              exchangeWeight: Math.random() < 0.12 ? random(0.14, 0.42) : 0,
              exchangeFrequency: random(0.26, 0.62),
              exchangePhase: random(0, TAU),
              exchangeDistance: random(0.08, 0.34),
              orbitRetention:
                radiusMix > 0.54 && Math.random() < 0.12
                  ? random(0.1, 0.28)
                  : 0,
            };
          });
        }

        function assignNearestTextTargets(particleList, textTargets) {
          const timings = getGatherTimings();
          const availableTargets = [...textTargets].sort((left, right) => {
            if (left.x !== right.x) {
              return left.x - right.x;
            }

            return left.y - right.y;
          });
          const particleOrigins = particleList
            .map((particle, index) => ({
              index,
              origin: getOrbitState(
                particle,
                timings.start + timings.duration * particle.gatherDelay,
                1,
              ),
            }))
            .sort((left, right) => {
              if (left.origin.x !== right.origin.x) {
                return left.origin.x - right.origin.x;
              }

              return left.origin.y - right.origin.y;
            });

          const totalParticles = Math.max(particleOrigins.length - 1, 1);

          particleOrigins.forEach((particleOrigin, orderIndex) => {
            const normalizedIndex = orderIndex / totalParticles;
            const desiredIndex = Math.round(
              normalizedIndex * Math.max(availableTargets.length - 1, 0),
            );
            const searchWindow = Math.max(
              24,
              Math.floor(availableTargets.length * 0.035),
            );
            const startIndex = Math.max(0, desiredIndex - searchWindow);
            const endIndex = Math.min(
              availableTargets.length - 1,
              desiredIndex + searchWindow,
            );
            let bestIndex = desiredIndex;
            let bestDistance = Number.POSITIVE_INFINITY;

            for (let index = startIndex; index <= endIndex; index += 1) {
              const target = availableTargets[index];
              const deltaX = particleOrigin.origin.x - target.x;
              const deltaY = particleOrigin.origin.y - target.y;
              const distance = deltaX * deltaX + deltaY * deltaY;

              if (distance < bestDistance) {
                bestDistance = distance;
                bestIndex = index;
              }
            }

            const target = availableTargets.splice(bestIndex, 1)[0];

            particleList[particleOrigin.index].targetX = target.x;
            particleList[particleOrigin.index].targetY = target.y;
          });
        }

        function buildDustParticles(count) {
          dustParticles = Array.from({length: count}, (_, index) => {
            const radiusMix = Math.pow(Math.random(), 0.92);
            const radius = radiusMix * galaxyRadius * 1.06;

            return {
              armIndex: index % armCount,
              radius,
              armJitter: random(-0.34, 0.34),
              spread: gaussianSpread() * (14 + radius * 0.08),
              speed: random(0.1, 0.28) / (1.15 + radiusMix * 4.1),
              squash: random(0.72, 0.98),
              size: random(0.7, 2.4),
              alpha: random(0.05, 0.2),
              hue: Math.random() < 0.2 ? random(28, 42) : random(205, 230),
              lightness: random(58, 74),
              driftSpeed: random(0.14, 0.48),
              driftOffset: random(0, TAU),
              parallax: random(0.014, 0.05),
            };
          });
        }

        function buildScene() {
          const areaScale = Math.max(
            0.72,
            Math.min(1.9, (width * height) / 1_350_000),
          );
          const viewportRadius = Math.hypot(width, height) * 0.5;
          const particleCount = Math.round(1400 * areaScale);

          armCount = width < 720 ? 3 : 4;
          galaxyRadius = viewportRadius * 1.16;
          haloRadius = galaxyRadius * 0.78;
          coreRadius = Math.min(width, height) * 0.25;

          buildBackgroundStars(Math.round(190 * areaScale));
          const textTargets = buildTextTargets(particleCount);
          buildGalaxyParticles(particleCount, textTargets);
          assignNearestTextTargets(particles, textTargets);
          buildDustParticles(Math.round(760 * areaScale));
        }

        function resize() {
          width = window.innerWidth;
          height = window.innerHeight;
          centerX = width / 2;
          centerY = height / 2;
          dpr = Math.min(window.devicePixelRatio || 1, 2);

          canvas.width = Math.round(width * dpr);
          canvas.height = Math.round(height * dpr);
          canvas.style.width = `${width}px`;
          canvas.style.height = `${height}px`;

          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          ctx.clearRect(0, 0, width, height);

          buildScene();
        }

        function getOrbitState(particle, time, motionScale = 1) {
          const armAngle = (TAU / armCount) * particle.armIndex;
          const angleWave =
            Math.sin(
              time * motionScale * particle.angleDrift +
                particle.angleDriftOffset,
            ) *
            (0.08 + (particle.radius / galaxyRadius) * 0.2);
          const orbitalAngle =
            armAngle +
            particle.armJitter +
            particle.radius * particle.spiralTightness +
            angleWave +
            time * motionScale * particle.speed;
          const radialBreath =
            Math.sin(
              time * motionScale * particle.driftSpeed + particle.driftOffset,
            ) *
              (2 + particle.radius * 0.01) +
            Math.cos(
              time * motionScale * particle.angleDrift * 1.7 +
                particle.angleDriftOffset,
            ) *
              (particle.radius * 0.012);
          const orbitRadius = particle.radius + radialBreath;
          const squash = particle.squash;
          const baseX = Math.cos(orbitalAngle) * orbitRadius;
          const baseY = Math.sin(orbitalAngle) * orbitRadius * squash;
          const spreadAngle = orbitalAngle + Math.PI / 2 + angleWave * 0.7;
          const spreadX = Math.cos(spreadAngle) * particle.spread;
          const spreadY = Math.sin(spreadAngle) * particle.spread * squash;
          const pointerOffsetX = 0;
          const pointerOffsetY = 0;

          return {
            orbitalAngle,
            orbitRadius,
            squash,
            spreadX,
            spreadY,
            pointerOffsetX,
            pointerOffsetY,
            x: centerX + baseX + spreadX,
            y: centerY + baseY + spreadY,
          };
        }

        function getOrbitalPoint(particle, time, motionScale = 1) {
          return getOrbitState(particle, time, motionScale);
        }

        function getGatherTimings() {
          if (motionQuery.matches) {
            return {start: 2, duration: 18.5};
          }

          return {start: 2, duration: 40};
        }

        function getSceneState(time) {
          const {start: gatherStart, duration: gatherDuration} =
            getGatherTimings();
          const gatherRaw = clamp((time - gatherStart) / gatherDuration, 0, 1);
          const exchangeRaw = clamp((gatherRaw - 0.72) / 0.28, 0, 1);

          return {
            gatherProgress: easeInOutCubic(gatherRaw),
            gatherRaw,
            auraPulse: 0.5 + Math.sin(time * 2.6) * 0.5,
            exchangeProgress: easeInOutCubic(exchangeRaw),
          };
        }

        function getParticleGatherMix(gatherProgress, particle) {
          const availableWindow = Math.max(0.001, 1 - particle.gatherDelay);
          const duration = Math.min(
            Math.max(availableWindow * particle.gatherSpan, 0.08),
            availableWindow,
          );
          const delayed = clamp(
            (gatherProgress - particle.gatherDelay) / duration,
            0,
            1,
          );
          const eased = easeInOutCubic(delayed);

          return Math.pow(eased, particle.gatherEasePower);
        }

        function getTextAnchor(particle, time, gatherMix) {
          const captureMix = Math.pow(1 - gatherMix, 1.9);

          return {
            x: particle.targetX,
            y: particle.targetY,
            captureMix,
          };
        }

        function getTextPoint(
          particle,
          time,
          gatherMix,
          motionScale = 1,
          textAnchor = getTextAnchor(particle, time, gatherMix),
        ) {
          const hoverMix = easeInOutCubic(
            clamp((gatherMix - 0.74) / 0.2, 0, 1),
          );
          const orbitRadius =
            particle.captureRadius * textAnchor.captureMix +
            hoverMix * Math.min(1.35, 0.24 + particle.captureRadius * 0.085);
          const orbitAngle =
            particle.captureAngle +
            time * motionScale * (0.82 + particle.speed * 1.8);
          const wavePhase =
            particle.restWaveOffset +
            particle.targetX * 0.012 +
            particle.targetY * 0.008;
          const approachMix =
            Math.sin(Math.PI * clamp(gatherMix, 0, 1)) *
            Math.pow(textAnchor.captureMix, 0.35);
          const wanderMix = approachMix + hoverMix * 0.2;
          const driftX =
            (particle.restOffsetX * 0.55 +
              Math.cos(
                time * particle.restFloatSpeed + particle.restFloatOffset,
              ) *
                particle.restFloatRadius +
              Math.sin(time * particle.restWaveSpeed + wavePhase) *
                particle.restWaveAmplitude) *
            wanderMix;
          const driftY =
            (particle.restOffsetY * 0.55 +
              Math.sin(
                time * particle.restFloatSpeed * 0.84 +
                  particle.restFloatOffset,
              ) *
                particle.restFloatRadius *
                0.72 +
              Math.cos(
                time * particle.restWaveSpeed * 0.82 + wavePhase * 1.08,
              ) *
                particle.restWaveAmplitude *
                0.72) *
            wanderMix;
          const shimmer =
            particle.targetDrift *
            (Math.pow(textAnchor.captureMix, 0.72) * 0.24 + hoverMix * 0.12);

          return {
            x:
              textAnchor.x +
              driftX +
              Math.cos(orbitAngle) * orbitRadius +
              Math.sin(time * 1.8 + particle.twinkleOffset) * shimmer,
            y:
              textAnchor.y +
              driftY +
              Math.sin(orbitAngle) * orbitRadius * 0.58 +
              Math.cos(time * 1.55 + particle.twinkleOffset) * shimmer * 0.74,
          };
        }

        function getGatherPoint(
          particle,
          gatherMix,
          orbitState,
          textAnchor,
          textPoint,
        ) {
          const radiusMix = easeInOutCubic(
            clamp(
              (gatherMix - particle.captureRadiusStart) /
                particle.captureRadiusSpan,
              0,
              1,
            ),
          );
          const centerMix = easeInOutCubic(
            clamp(
              (gatherMix - particle.captureCenterStart) /
                particle.captureCenterSpan,
              0,
              1,
            ),
          );
          const settleMix = easeInOutCubic(
            clamp(
              (gatherMix - particle.captureSettleStart) /
                particle.captureSettleSpan,
              0,
              1,
            ),
          );
          const orbitCenterX = centerX + orbitState.pointerOffsetX;
          const orbitCenterY = centerY + orbitState.pointerOffsetY;
          const migratingCenterX = interpolate(
            orbitCenterX,
            textAnchor.x,
            centerMix,
          );
          const migratingCenterY = interpolate(
            orbitCenterY,
            textAnchor.y,
            centerMix,
          );
          const capturedRadius =
            particle.captureRadius * (1.08 - settleMix * 0.48);
          const orbitRadius = interpolate(
            orbitState.orbitRadius,
            capturedRadius,
            radiusMix,
          );
          const orbitAngle =
            orbitState.orbitalAngle +
            particle.captureAngle * gatherMix * 0.18 +
            particle.arrivalSpin * particle.arrivalCurve * gatherMix;
          const spreadFade = Math.pow(1 - radiusMix, 1.12);
          const orbitX =
            migratingCenterX +
            Math.cos(orbitAngle) * orbitRadius +
            orbitState.spreadX * spreadFade * 0.42;
          const orbitY =
            migratingCenterY +
            Math.sin(orbitAngle) * orbitRadius * orbitState.squash +
            orbitState.spreadY * spreadFade * 0.42;

          return {
            x: interpolate(orbitX, textPoint.x, settleMix),
            y: interpolate(orbitY, textPoint.y, settleMix),
          };
        }

        function getParticleExchangeMix(sceneState, particle, time) {
          if (!particle.exchangeWeight || sceneState.exchangeProgress <= 0) {
            return 0;
          }

          const pulse = Math.pow(
            Math.max(
              0,
              Math.sin(
                time * particle.exchangeFrequency + particle.exchangePhase,
              ),
            ),
            5,
          );

          return sceneState.exchangeProgress * particle.exchangeWeight * pulse;
        }

        function drawBackground(time, sceneState) {
          ctx.globalCompositeOperation = 'source-over';
          ctx.fillStyle = 'rgba(3, 4, 12, 0.26)';
          ctx.fillRect(0, 0, width, height);

          const nebulaAlpha = 1 - sceneState.gatherProgress * 0.2;

          const nebulaA = ctx.createRadialGradient(
            centerX - haloRadius * 0.48 + pointer.x * 110,
            centerY - haloRadius * 0.12 + pointer.y * 50,
            0,
            centerX - haloRadius * 0.48,
            centerY - haloRadius * 0.12,
            haloRadius * 0.95,
          );
          nebulaA.addColorStop(0, `rgba(86, 140, 255, ${0.13 * nebulaAlpha})`);
          nebulaA.addColorStop(
            0.45,
            `rgba(87, 97, 255, ${0.08 * nebulaAlpha})`,
          );
          nebulaA.addColorStop(1, 'rgba(0, 0, 0, 0)');
          ctx.fillStyle = nebulaA;
          ctx.fillRect(0, 0, width, height);

          const nebulaB = ctx.createRadialGradient(
            centerX + haloRadius * 0.54 - pointer.x * 100,
            centerY + haloRadius * 0.16 - pointer.y * 70,
            0,
            centerX + haloRadius * 0.54,
            centerY + haloRadius * 0.16,
            haloRadius * 0.82,
          );
          nebulaB.addColorStop(0, `rgba(255, 120, 164, ${0.09 * nebulaAlpha})`);
          nebulaB.addColorStop(
            0.42,
            `rgba(255, 177, 104, ${0.06 * nebulaAlpha})`,
          );
          nebulaB.addColorStop(1, 'rgba(0, 0, 0, 0)');
          ctx.fillStyle = nebulaB;
          ctx.fillRect(0, 0, width, height);

          const textVeil = ctx.createRadialGradient(
            centerX,
            centerY,
            coreRadius * 0.1,
            centerX,
            centerY,
            haloRadius * 0.42,
          );
          textVeil.addColorStop(
            0,
            `rgba(2, 3, 10, ${sceneState.gatherProgress * 0.16})`,
          );
          textVeil.addColorStop(
            0.42,
            `rgba(2, 3, 10, ${sceneState.gatherProgress * 0.06})`,
          );
          textVeil.addColorStop(1, 'rgba(2, 3, 10, 0)');
          ctx.fillStyle = textVeil;
          ctx.fillRect(0, 0, width, height);

          for (const star of backgroundStars) {
            const orbitalAngle = star.baseAngle + time * star.orbitSpeed;
            const baseX = centerX + Math.cos(orbitalAngle) * star.baseRadius;
            const baseY =
              centerY +
              Math.sin(orbitalAngle) * star.baseRadius * star.orbitSquash;
            const driftX =
              baseX +
              Math.cos(time * star.driftSpeed + star.driftPhase) *
                star.driftRadius;
            const driftY =
              baseY +
              Math.sin(
                time * star.driftSpeed * star.driftTilt + star.driftPhase,
              ) *
                star.driftRadius *
                0.7;
            const shimmer =
              0.65 +
              (Math.sin(time * star.twinkleSpeed + star.twinkleOffset) + 1) *
                0.18;
            ctx.beginPath();
            ctx.arc(driftX, driftY, star.size * shimmer, 0, TAU);
            ctx.fillStyle = `hsla(${star.hue}, 85%, 78%, ${star.alpha * shimmer})`;
            ctx.fill();
          }
        }

        function drawCore(time, sceneState) {
          const shiftX = pointer.x * 24 + Math.sin(time * 0.42) * 10;
          const shiftY = pointer.y * 18 + Math.cos(time * 0.36) * 8;
          const focusedCoreRadius = interpolate(
            coreRadius,
            coreRadius * 0.48,
            sceneState.gatherProgress,
          );
          const haloSpread = interpolate(
            haloRadius * 0.76,
            haloRadius * 0.5,
            sceneState.gatherProgress,
          );

          const coreGlow = ctx.createRadialGradient(
            centerX + shiftX * 0.22,
            centerY + shiftY * 0.22,
            0,
            centerX,
            centerY,
            focusedCoreRadius,
          );
          coreGlow.addColorStop(
            0,
            `rgba(255, 248, 226, ${interpolate(0.82, 0.08, sceneState.gatherProgress)})`,
          );
          coreGlow.addColorStop(
            0.18,
            `rgba(255, 214, 156, ${interpolate(0.38, 0.1, sceneState.gatherProgress)})`,
          );
          coreGlow.addColorStop(
            0.48,
            `rgba(121, 186, 255, ${interpolate(0.14, 0.055, sceneState.gatherProgress)})`,
          );
          coreGlow.addColorStop(
            0.78,
            `rgba(121, 186, 255, ${interpolate(0.06, 0.03, sceneState.gatherProgress)})`,
          );
          coreGlow.addColorStop(1, 'rgba(0, 0, 0, 0)');
          ctx.fillStyle = coreGlow;
          ctx.fillRect(0, 0, width, height);

          const corona = ctx.createRadialGradient(
            centerX - shiftX * 0.4,
            centerY - shiftY * 0.4,
            focusedCoreRadius * 0.12,
            centerX,
            centerY,
            haloSpread,
          );
          corona.addColorStop(
            0,
            `rgba(119, 206, 255, ${interpolate(0.14, 0.08, sceneState.gatherProgress)})`,
          );
          corona.addColorStop(
            0.4,
            `rgba(255, 129, 170, ${interpolate(0.07, 0.035, sceneState.gatherProgress)})`,
          );
          corona.addColorStop(1, 'rgba(0, 0, 0, 0)');
          ctx.fillStyle = corona;
          ctx.fillRect(0, 0, width, height);
        }

        function drawDust(time, sceneState) {
          const dustMotionScale = interpolate(
            1,
            0.58,
            sceneState.gatherProgress,
          );

          for (const particle of dustParticles) {
            const {x, y} = getOrbitalPoint(particle, time, dustMotionScale);
            const alpha =
              particle.alpha * (1 - sceneState.gatherProgress * 0.74);

            ctx.beginPath();
            ctx.arc(x, y, particle.size, 0, TAU);
            ctx.fillStyle = `hsla(${particle.hue}, 72%, ${particle.lightness}%, ${alpha})`;
            ctx.fill();
          }
        }

        function drawGalaxy(time, sceneState) {
          let settledCount = 0;

          for (const particle of particles) {
            const gatherMix = getParticleGatherMix(
              sceneState.gatherRaw,
              particle,
            );

            if (gatherMix > 0.84) {
              settledCount += 1;
            }

            const orbitState = getOrbitState(particle, time, 1);
            const orbitalPoint = orbitState;
            const textAnchor = getTextAnchor(particle, time, gatherMix);
            const textPoint = getTextPoint(
              particle,
              time,
              gatherMix,
              1,
              textAnchor,
            );
            const gatherPoint = getGatherPoint(
              particle,
              gatherMix,
              orbitState,
              textAnchor,
              textPoint,
            );
            const retainedPoint = {
              x: interpolate(
                gatherPoint.x,
                orbitalPoint.x,
                particle.orbitRetention * gatherMix,
              ),
              y: interpolate(
                gatherPoint.y,
                orbitalPoint.y,
                particle.orbitRetention * gatherMix,
              ),
            };
            const exchangeMix = getParticleExchangeMix(
              sceneState,
              particle,
              time,
            );
            const exchangedPoint = {
              x: interpolate(
                retainedPoint.x,
                orbitalPoint.x,
                exchangeMix * particle.exchangeDistance,
              ),
              y: interpolate(
                retainedPoint.y,
                orbitalPoint.y,
                exchangeMix * particle.exchangeDistance,
              ),
            };
            const x = exchangedPoint.x;
            const y = exchangedPoint.y;
            const pulse =
              0.76 +
              (Math.sin(time * particle.twinkleSpeed + particle.twinkleOffset) +
                1) *
                0.17;
            const pointSize = Math.max(
              0.95,
              particle.size *
                pulse *
                interpolate(1.02, particle.finalScale, gatherMix),
            );
            const glowSize =
              particle.size *
              particle.glowScale *
              interpolate(2.15 + pulse * 0.46, 1.54 + pulse * 0.28, gatherMix);
            const lightness = Math.min(particle.lightness + gatherMix * 12, 92);
            const alpha = Math.min(
              particle.alpha * (0.92 + gatherMix * 0.12 + exchangeMix * 0.08),
              1,
            );

            if (
              particle.trailAlpha > 0 &&
              gatherMix > 0.08 &&
              gatherMix < 0.82 &&
              particle.trailAlpha > 0.08
            ) {
              const trailStartX = interpolate(x, gatherPoint.x, 0.16);
              const trailStartY = interpolate(y, gatherPoint.y, 0.16);
              ctx.beginPath();
              ctx.moveTo(trailStartX, trailStartY);
              ctx.lineTo(x, y);
              ctx.strokeStyle = `hsla(${particle.hue}, 88%, ${lightness}%, ${particle.trailAlpha * gatherMix * 0.34})`;
              ctx.lineWidth = Math.max(0.2, particle.size * 0.28);
              ctx.stroke();
            }

            if (exchangeMix > 0.12) {
              const exchangeStartX = interpolate(x, textPoint.x, 0.18);
              const exchangeStartY = interpolate(y, textPoint.y, 0.18);
              ctx.beginPath();
              ctx.moveTo(exchangeStartX, exchangeStartY);
              ctx.lineTo(x, y);
              ctx.strokeStyle = `hsla(${particle.hue}, 84%, ${lightness}%, ${0.015 + exchangeMix * 0.06})`;
              ctx.lineWidth = Math.max(0.16, pointSize * 0.22);
              ctx.stroke();
            }

            ctx.beginPath();
            ctx.arc(x, y, glowSize, 0, TAU);
            ctx.fillStyle = `hsla(${particle.hue}, 92%, ${lightness}%, ${alpha * interpolate(0.075, 0.062, gatherMix)})`;
            ctx.fill();

            ctx.beginPath();
            ctx.arc(x, y, pointSize, 0, TAU);
            ctx.fillStyle = `hsla(${particle.hue}, 96%, ${Math.min(lightness + 8, 94)}%, ${Math.min(
              alpha * pulse,
              1,
            )})`;
            ctx.fill();
          }

          return particles.length ? settledCount / particles.length : 0;
        }

        function frame(now) {
          const delta = Math.min((now - lastFrame) / 1000, 0.05);
          lastFrame = now;

          const smoothing = 1 - Math.pow(0.0001, delta * 1.7);
          pointer.x += (pointer.targetX - pointer.x) * smoothing;
          pointer.y += (pointer.targetY - pointer.y) * smoothing;

          const motionScale = motionQuery.matches ? 0.28 : 1;
          const time = (now - sceneStart) * 0.001 * motionScale;
          const sceneState = getSceneState(time);

          drawBackground(time, sceneState);

          ctx.save();
          ctx.globalCompositeOperation = 'screen';
          drawCore(time, sceneState);
          drawDust(time, sceneState);
          const settledRatio = drawGalaxy(time, sceneState);
          ctx.restore();

          document.body.classList.toggle('is-gathered', settledRatio > 0.74);

          animationId = window.requestAnimationFrame(frame);
        }

        window.addEventListener(
          'pointermove',
          event => {
            setPointer(event.clientX, event.clientY);
          },
          {passive: true},
        );

        window.addEventListener(
          'touchmove',
          event => {
            const touch = event.touches[0];

            if (touch) {
              setPointer(touch.clientX, touch.clientY);
            }
          },
          {passive: true},
        );

        window.addEventListener('pointerleave', resetPointer, {passive: true});
        window.addEventListener('touchend', resetPointer, {passive: true});
        window.addEventListener('resize', resize, {passive: true});

        document.addEventListener('visibilitychange', () => {
          if (document.hidden) {
            window.cancelAnimationFrame(animationId);
          } else {
            lastFrame = performance.now();
            animationId = window.requestAnimationFrame(frame);
          }
        });

        resize();
        ctx.fillStyle = '#02030a';
        ctx.fillRect(0, 0, width, height);
        animationId = window.requestAnimationFrame(frame);
      })();
    </script>
  </body>
</html>
